# ============================================================================
# FIOVA Growth OS -- Workspace Configuration
# ============================================================================
# This file is the single source of truth for workspace state.
# Loaded at boot by every agent. Updated by foundations pipeline as each
# phase completes. Downstream agents read creator context from here.
# ============================================================================

workspace:
  name: "FIOVA Growth OS"
  slug: fiova-growth-os
  description: "Complete growth operating system for info/education creator businesses"
  version: "1.0.0"
  adapter: claude_code

# ----------------------------------------------------------------------------
# Budget & Resource Allocation
# ----------------------------------------------------------------------------
budget:
  monthly_usd: 5000
  warning_pct: 80
  stop_pct: 100
  per_agent_default: 400

# ----------------------------------------------------------------------------
# Governance
# ----------------------------------------------------------------------------
governance:
  board_approval:
    - new_agent_hire
    - budget_increase_pct: 25
    - scope_change
  escalation_chain: [growth-director]
  issue_prefix: GRO

# ----------------------------------------------------------------------------
# Strategic Goals & Initiatives
# ----------------------------------------------------------------------------
goals:
  initiatives:
    - id: foundations-pipeline
      name: "Complete Foundations Pipeline"
      description: "Validate market, build ICP, establish positioning, architect offer, extract brand voice"
      status: active
      projects:
        - market-research
        - icp-build
        - positioning
        - offer-architecture
        - brand-voice

    - id: content-engine
      name: "Build Content Production Engine"
      description: "Establish repeatable content production across all channels"
      status: pending
      depends_on: [foundations-pipeline]
      projects:
        - content-strategy
        - youtube-pipeline
        - short-form-pipeline
        - social-pipeline
        - seo-pipeline
        - podcast-pipeline

    - id: nurture-system
      name: "Build Nurture & Education System"
      description: "Create automated nurture sequences that move leads from awareness to readiness"
      status: pending
      depends_on: [foundations-pipeline]
      projects:
        - email-automations
        - lead-magnets
        - community-strategy
        - webinar-funnel

    - id: sales-system
      name: "Build Sales Conversion System"
      description: "Create sales assets, funnels, and scripts that convert nurtured leads"
      status: pending
      depends_on: [foundations-pipeline]
      projects:
        - vsl-production
        - funnel-build
        - sales-scripts
        - dm-sequences
        - objection-library

    - id: launch-system
      name: "Launch & Scale Operations"
      description: "Plan and execute launches, then build systems for repeatable growth"
      status: pending
      depends_on: [content-engine, sales-system]
      projects:
        - launch-planning
        - post-launch-analysis
        - sop-library
        - team-building
        - financial-reporting

# ----------------------------------------------------------------------------
# Creator Context
# Populated during onboarding and updated as foundations pipeline completes.
# Every downstream agent reads from this section.
# ----------------------------------------------------------------------------
creator:
  business:
    name: ""
    niche: ""
    category: ""  # coaching | course | community | consulting | digital-product | membership | mastermind
    stage: ""     # idea | pre-revenue | early-revenue | growing | scaling
    description: ""
    website: ""
    social_handles: {}

  # Ideal Customer Profile -- summary loaded here, full document in reference/
  icp:
    summary: ""
    limiting_belief_pattern: ""  # worthless | helpless | hopeless
    awareness_level: ""          # unaware | problem-aware | solution-aware | product-aware | most-aware
    transformation_type: ""      # status | capability | safety
    full_profile: "reference/icp.md"

  # Offer Architecture -- summary loaded here, full document in reference/
  offer:
    name: ""
    type: ""              # course | coaching | community | hybrid | done-for-you | done-with-you
    price: ""
    delivery_model: ""
    unique_mechanism: ""
    transformation: ""
    guarantee: ""
    ltv_cac_ratio: ""
    full_profile: "reference/offers.md"

  # Brand Voice -- summary loaded here, full document in reference/
  brand:
    voice_summary: ""
    tone: ""              # authoritative | conversational | provocative | empathetic | energetic
    language_level: ""    # casual | professional | academic | street | mixed
    vocabulary_notes: ""
    full_profile: "reference/brand-voice.md"

  # Business Goals
  goals:
    primary_goal: ""
    monthly_revenue_target: ""
    monthly_lead_target: ""
    primary_channel: ""     # youtube | instagram | tiktok | twitter | linkedin | podcast | blog | paid-ads
    secondary_channels: []
    timeline: ""

  # Market Context -- populated by market-researcher
  market:
    maturity_stage: ""    # naive | aware | skeptical | exhausted
    market_state: ""      # expanding | stable | contracting
    viability_score: ""   # 0-100
    demand_velocity: ""   # growing | stable | declining
    competitive_density: ""  # low | medium | high | saturated
    tam: ""
    sam: ""
    som: ""

  # Competitive Landscape -- populated by market-researcher and competitor-analyst
  competitors: []
  # Each entry:
  #   - name: ""
  #     positioning: ""
  #     price_range: ""
  #     strengths: []
  #     weaknesses: []
  #     gap_exploitable: ""

# ----------------------------------------------------------------------------
# Foundations Pipeline Status
# Tracks completion state of each foundations phase.
# Values: none | in_progress | complete | failed
# Updated by each foundations agent as it completes its work.
# The Foundations Gate checks ALL statuses before unlocking downstream modes.
# ----------------------------------------------------------------------------
foundations_status:
  market_research: none       # Go/No-Go assessment, viability >= 50
  icp: none                   # 13-section ICP document, completeness >= 80
  positioning: none           # Positioning & niche, quality S/N >= 0.5
  offer: none                 # Offer architecture, LTV:CAC >= 3.0
  brand_voice: none           # Brand voice profile, 10+ samples analyzed

# ----------------------------------------------------------------------------
# Quality Gate Results
# Populated as each artifact passes (or fails) its quality gate.
# Provides an audit trail of quality scores across the pipeline.
# ----------------------------------------------------------------------------
quality_gates:
  market_research:
    score: null
    completeness: null
    viability: null
    passed: null
    date: null
    revision_count: 0

  icp:
    score: null
    completeness: null
    sections_present: null
    passed: null
    date: null
    revision_count: 0

  positioning:
    score: null
    completeness: null
    mechanism_named: null
    passed: null
    date: null
    revision_count: 0

  offer:
    score: null
    completeness: null
    ltv_cac: null
    passed: null
    date: null
    revision_count: 0

  brand_voice:
    score: null
    completeness: null
    samples_analyzed: null
    passed: null
    date: null
    revision_count: 0

# ----------------------------------------------------------------------------
# Runtime State
# Tracks current operational state of the workspace.
# ----------------------------------------------------------------------------
runtime:
  current_mode: null          # plan | execute | educate | convert | deploy | systemize
  current_phase: null         # FSM state (e.g., :market_research, :content_production)
  active_agent: null          # Agent currently executing
  last_handoff: null          # Path to last handoff document
  session_start: null
  total_artifacts_produced: 0
